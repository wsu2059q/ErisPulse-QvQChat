services:
  qvqchat:
    image: erispulse/erispulse-qvqchat:latest
    container_name: qvqchat
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    volumes:
      - ./config.toml:/app/config/config.toml
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - qvc-net

networks:
  qvc-net:
    driver: bridge
