# QvQChat 配置示例
# AI 模型和行为配置请通过 Dashboard Web 管理面板进行
# 本文件仅保留基础设置

[QvQChat]

# 最大会话历史长度
max_history_length = 20

# 最小回复间隔（秒）
min_reply_interval = 10

# 消息限制
max_message_length = 1000
rate_limit_tokens = 20000
rate_limit_window = 60

# 忽略指令消息（防止AI响应指令）
ignore_command_messages = true

# 机器人识别
bot_nicknames = []
bot_ids = []

# 管理员
[QvQChat.admin]
admins = []

# 窥屏模式（群聊默认默默观察）
[QvQChat.stalker_mode]
enabled = true
default_probability = 0.03
mention_probability = 0.8
keyword_probability = 0.5
min_messages_between_replies = 15
max_replies_per_hour = 8
silence_threshold_minutes = 30

# 对话连续性
[QvQChat.continue_conversation]
enabled = true
max_messages = 3
max_duration = 120

# 知识库（通过 Dashboard 管理内容）
[QvQChat.knowledge_base]
enabled = true
max_context_tokens = 2000
auto_search = true

# MCP 工具调用
[QvQChat.mcp]
enabled = true
auto_inject = true

# 多智能体
[QvQChat.multi_agent]
enabled = true

# 语音合成
[QvQChat.voice]
enabled = false
api_url = "https://api.siliconflow.cn/v1/audio/speech"
api_key = ""
model = "FunAudioLLM/CosyVoice2-0.5B"
voice = ""
speed = 1.0
gain = 0.0
sample_rate = 44100
platforms = ["qq", "onebot11"]
